<!-- E-commerce checkout template page -->
<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center text-primary mb-4">💳 Checkout</h2>

    <form method="POST" class="bg-white p-4 shadow rounded" style="max-width: 500px; margin: auto;">
        <div class="mb-3">
            <label class="form-label">Card Number</label>
            <input type="text" name="card" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">CVV</label>
            <input type="password" name="cvv" class="form-control" required>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-success">Pay Now</button>
        </div>
    </form>
</div>

</body>
</html>
