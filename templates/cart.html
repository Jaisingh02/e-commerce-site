<!-- E-commerce shopping cart view template -->
<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4 text-primary">🛒 Your Shopping Cart</h2>

    <ul class="list-group mb-4">
        {% for item in cart_items %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ item.name }}
            <span class="badge bg-primary rounded-pill">₹{{ item.price }}</span>
        </li>
        {% endfor %}
    </ul>

    <p class="text-center fs-5">Total: ₹{{ total }}</p>

    <div class="text-center">
        <a href="{{ url_for('checkout') }}" class="btn btn-success">💳 Proceed to Checkout</a>
    </div>
</div>

</body>
</html>
