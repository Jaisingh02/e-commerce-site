<!DOCTYPE html>
<html>
<head>
    <title>Payment Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .success-icon {
            font-size: 4rem;
            color: #28a745;
            animation: pop 0.5s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5 d-flex justify-content-center">
    <div class="card text-center shadow p-4" style="max-width: 500px;">
        <div class="card-body">
            <div class="success-icon mb-3">✅</div>
            <h2 class="card-title text-success">Payment Successful!</h2>
            <p class="card-text text-muted">Thank you for your purchase. Your order has been placed and will be processed shortly.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Continue Shopping</a>
        </div>
    </div>
</div>

</body>
</html>
